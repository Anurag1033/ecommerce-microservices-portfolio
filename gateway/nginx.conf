events {
    worker_connections 1024;
}

http {
    # Define the upstream Order Service container
    upstream order_api {
        server order_service:5001;
    }

    server {
        listen 80;

        # Route all /api/v1/orders requests to the Order Service
        location /api/v1/orders/ {
            proxy_pass http://order_api;
            
            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Inject a correlation ID for distributed tracing
            proxy_set_header X-Request-ID $request_id;
        }

        # Health check endpoint for the gateway itself
        location /health {
            return 200 'Gateway is healthy\n';
        }
    }
}